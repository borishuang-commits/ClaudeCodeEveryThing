    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: transparent;
            overflow: hidden;
        }
        #ad-container {
            width: 100%;
            height: 100%;
            background-color: transparent;
            z-index: 999999;
            opacity: 0;
            transition: opacity 0.3s ease;
            position: relative;
        }
        #ad-container.ready {
            opacity: 1;
        }
        #intro-video {
            position: absolute;
            top: 50%;

            background-color: #000;
        }
        .hidden-video {
            opacity: 0 !important;
        }
        #bottom-swiper-wrap {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            aspect-ratio: 2 / 1;
            height: auto;
            z-index: 5;
            background: transparent;
            opacity: 0;
            transition: opacity 0.8s ease-in;
            pointer-events: none;
            display: none;
        }
        #bottom-swiper-wrap.show {
            display: block;
            opacity: 1;
            pointer-events: auto;

        #close-btn {
            position: absolute;
            top: 5px;

            color: #fff;
            font-size: 18px;
            font-family: Arial, sans-serif;
            text-align: center;
            line-height: 24px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 20;
            pointer-events: auto;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }
        .swiper {
            width: 100%;
            height: 100%;
        }
        .swiper-slide {
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-color: transparent;
        }
        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
        }
        .swiper-pagination-bullet {
            background: #fff;
            opacity: 0.6;
        }
        .swiper-pagination-bullet-active {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="ad-container">
        <video id="intro-video" muted playsinline onpointerup="window.open(clickTag, '_top')">
            <source src="https://static.91app.com/marketing-cloud/ads/demo2.mp4" type="video/mp4">
        </video>
        <div id="bottom-swiper-wrap">
            <div id="close-btn" onclick="closeAd(event)">×</div>
            <div class="swiper mySwiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide">
                        <img src="https://rich-media-tool-platform.bclk.tw/dv360-ads/1773725955878-65d1322e138e95a6-Untitled_design__21_.png"
                            alt="AD 1" ontouchend="window.open(clickTag, '_top')">
                    </div>
                </div>
                <div class="swiper-pagination"></div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // 記錄被修改的祖先元素，關閉時還原
        var modifiedAncestors = [];
        var ancestorObserver = null;

        // 擴展策略：SafeFrame > Friendly iframe (frameElement) > fallback
        function tryExpand() {
            // 策略 1：SafeFrame 環境
            if (window.$sf && window.$sf.ext) {
                console.log('[Ad] SafeFrame 環境，使用 $sf.ext.expand');
                try {
                    var geom = window.$sf.ext.geom();
                    var w = geom ? geom.win.w : screen.width;
                    var h = geom ? geom.win.h : screen.height;
                    window.$sf.ext.register(1, 1, function (id, msg) {
                        console.log('[Ad] SafeFrame status:', msg);
                        if (msg === 'expanded') { showAd(); }
                    });
                    window.$sf.ext.expand({ push: true, t: 0, l: 0, r: w, b: h });
                } catch (e) {
                    console.log('[Ad] SafeFrame expand failed:', e);
                    showAd();
                }
                return;
            }

            // 策略 2：Friendly iframe — iframe 用 position:fixed 浮出
            if (window.frameElement) {
                console.log('[Ad] Friendly iframe 環境');
                try {
                    // 只修復祖先的隱藏屬性和 transform，不動尺寸/定位
                    fixAncestors();
                    // iframe 自己用 fixed 全螢幕
                    setIframeMode('fullscreen');
                    // 持續監控 transform
                    startAncestorObserver();
                    console.log('[Ad] 展開完成');
                    showAd();
                } catch (e) {
                    console.log('[Ad] 展開失敗:', e);
                    showAd();
                }
                return;
            }

            // 策略 3：本機預覽
            console.log('[Ad] 本機預覽環境');
            showAd();
        }

        // 只修復祖先的「隱藏類」屬性 + transform，完全不動尺寸和定位
        function fixAncestors() {
            if (!window.frameElement) return;
            var el = window.frameElement.parentElement;
            while (el && el.tagName !== 'BODY' && el !== window.parent.document.documentElement) {
                var computed = window.parent.getComputedStyle(el);

                // 記錄原始 style
                var alreadyTracked = false;
                for (var i = 0; i < modifiedAncestors.length; i++) {
                    if (modifiedAncestors[i].el === el) { alreadyTracked = true; break; }
                }
                if (!alreadyTracked) {
                    modifiedAncestors.push({ el: el, originalStyle: el.getAttribute('style') || '' });
                }

                // 修復隱藏屬性
                if (computed.display === 'none') {
                    el.style.setProperty('display', 'block', 'important');
                }
                if (parseFloat(computed.opacity) === 0) {
                    el.style.setProperty('opacity', '1', 'important');
                }
                if (computed.visibility === 'hidden') {
                    el.style.setProperty('visibility', 'visible', 'important');
                }
                if (computed.pointerEvents === 'none') {
                    el.style.setProperty('pointer-events', 'auto', 'important');
                }
                // 清除 transform（讓 iframe 的 position:fixed 能正常相對 viewport）
                el.style.setProperty('transform', 'none', 'important');
                // 修復負 z-index
                var zIndex = parseInt(computed.zIndex);
                if (!isNaN(zIndex) && zIndex < 0) {
                    el.style.setProperty('z-index', '1', 'important');
                }

                console.log('[Ad] 修復祖先:', el.tagName, el.id || el.className);
                el = el.parentElement;
            }
        }

        // 設定 iframe 的模式（不動祖先尺寸）
        function setIframeMode(mode) {
            if (!window.frameElement) return;
            var frame = window.frameElement;
            frame.style.border = '0';

            if (mode === 'fullscreen') {
                frame.style.width = '100vw';
                frame.style.height = '100vh';
                frame.style.position = 'fixed';
                frame.style.top = '0';
                frame.style.left = '0';
                frame.style.bottom = 'auto';
                frame.style.zIndex = '999999';
            } else if (mode === 'anchor') {
                frame.style.width = '100vw';
                frame.style.height = '50vw';
                frame.style.position = 'fixed';
                frame.style.top = 'auto';
                frame.style.left = '0';
                frame.style.bottom = '0';
                frame.style.zIndex = '999999';
            }
            console.log('[Ad] iframe 模式:', mode);
        }

        // MutationObserver：持續攔截 publisher JS 重設的 transform
        function startAncestorObserver() {
            if (!window.frameElement) return;
            var targets = [];
            var el = window.frameElement.parentElement;
            while (el && el.tagName !== 'BODY' && el !== window.parent.document.documentElement) {
                targets.push(el);
                el = el.parentElement;
            }

            ancestorObserver = new window.parent.MutationObserver(function (mutations) {
                for (var i = 0; i < mutations.length; i++) {
                    var target = mutations[i].target;
                    var current = target.style.transform;
                    if (current && current !== 'none') {
                        target.style.setProperty('transform', 'none', 'important');
                        console.log('[Ad] Observer 攔截 transform:', target.tagName, target.className);
                    }
                }
            });

            for (var i = 0; i < targets.length; i++) {
                ancestorObserver.observe(targets[i], { attributes: true, attributeFilter: ['style'] });
            }
            console.log('[Ad] MutationObserver 啟動，監聽', targets.length, '個祖先');
        }

        function stopAncestorObserver() {
            if (ancestorObserver) {
                ancestorObserver.disconnect();
                ancestorObserver = null;
            }
        }

        function showAd() {
            document.getElementById('ad-container').classList.add('ready');
            startAdSequence();
        }

        function startAdSequence() {
            var videoElement = document.getElementById('intro-video');
            var swiperWrap = document.getElementById('bottom-swiper-wrap');
            var adContainer = document.getElementById('ad-container');

            videoElement.play().catch(function (e) { console.log("Autoplay issue:", e); });

            setTimeout(function () {
                videoElement.classList.add('hidden-video');
                setTimeout(function () {
                    videoElement.pause();
                    videoElement.style.display = 'none';
                }, 800);
                swiperWrap.classList.add('show');
                initSwiper();
                // 第二段：iframe 縮到底部 anchor
                setIframeMode('anchor');
            }, 5000);
        }

        function initSwiper() {
            new Swiper(".mySwiper", {
                slidesPerView: 1,
                spaceBetween: 0,
                loop: true,
                pagination: {
                    el: ".swiper-pagination",
                    clickable: true
                }
            });
        }

        function closeAd(event) {
            event.stopPropagation();
            document.getElementById('ad-container').style.display = 'none';

            // SafeFrame：collapse
            if (window.$sf && window.$sf.ext) {
                try { window.$sf.ext.collapse(); } catch (e) { }
            }

            // 停止監控
            stopAncestorObserver();

            // Friendly iframe：還原
            if (window.frameElement) {
                try {
                    var frame = window.frameElement;
                    frame.style.width = '1px';
                    frame.style.height = '1px';
                    frame.style.position = '';
                    frame.style.top = '';
                    frame.style.left = '';
                    frame.style.bottom = '';
                    frame.style.zIndex = '';
                    frame.width = 1;
                    frame.height = 1;

                    // 還原祖先的原始 style
                    for (var i = 0; i < modifiedAncestors.length; i++) {
                        modifiedAncestors[i].el.setAttribute('style', modifiedAncestors[i].originalStyle);
                    }
                    modifiedAncestors = [];
                } catch (e) { }
            }
        }

        // 啟動
        window.onload = function () {
            tryExpand();
        };
    </script>
</body>
</html>
