<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="ad.size" content="width=360,height=640">
<meta name="viewport" content="width=360,initial-scale=1">
<title>ASUS Ad 1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:360px;height:640px;overflow:hidden;background:#000}
#ad-container{position:relative;width:360px;height:640px;cursor:pointer}
video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
</style>
</head>
<body>
<div id="ad-container">
  <video id="vid" playsinline muted loop preload="auto">
    <source src="https://static.91app.com/marketing-cloud/ads/demo1.mp4" type="video/mp4">
  </video>
</div>
<script>
var clickTag = "https://www.momoshop.com.tw/category/DgrpCategory.jsp?d_code=2138700017&p_orderType=4&showType=chessboardType&osm=t04&utm_source=BD_009618&utm_medium=google-cpc&scm_activity=202603200512xil3pc71";

var container = document.getElementById("ad-container");
var vid = document.getElementById("vid");

container.addEventListener("click", function() {
  window.open(clickTag, "_blank");
});

// Autoplay with retry
function tryPlay() {
  var p = vid.play();
  if (p !== undefined) {
    p.catch(function() {
      setTimeout(tryPlay, 200);
    });
  }
}

vid.addEventListener("canplay", tryPlay);
vid.load();

// Fallback: try on any user interaction
document.addEventListener("touchstart", function() { vid.play(); }, { once: true });
document.addEventListener("click", function() { vid.play(); }, { once: true });
</script>
</body>
</html>
